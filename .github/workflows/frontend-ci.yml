name: ClinixAI Frontend Quality Gate

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "release/**"

  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: TypeScript and Next.js Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Run lint when configured
        shell: bash
        run: |
          if npm run | grep -q " lint"; then
            npm run lint
          else
            echo "No lint script is currently configured."
          fi

      - name: Build production application
        run: npm run build

      - name: Upload build diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-diagnostics
          path: |
            frontend/.next
            frontend/npm-debug.log
          if-no-files-found: ignore
          retention-days: 7