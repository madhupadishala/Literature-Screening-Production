version: 2

updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Kolkata

    open-pull-requests-limit: 5

    labels:
      - dependencies
      - frontend
      - security-review

    commit-message:
      prefix: "deps"
      include: scope

    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - patch
          - minor

      development-dependencies:
        dependency-type: development
        update-types:
          - patch
          - minor

    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly

    open-pull-requests-limit: 3

    labels:
      - dependencies
      - github-actions

    commit-message:
      prefix: "ci"